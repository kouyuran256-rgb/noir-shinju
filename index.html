<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOIR SHINJU | HOME</title>
    <style>
        /* Base Styles */
        body {
            margin: 0;
            background: black;
            color: white;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            scroll-behavior: smooth;
        }

        /* --- Navigation --- */
        nav {
            position: fixed; 
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 60px;
            z-index: 999;
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            box-sizing: border-box;
        }

        nav.scrolled {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            padding: 15px 60px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo { 
            font-weight: 700; 
            font-size: 18px; 
            letter-spacing: 5px;
            text-decoration: none;
            color: white;
        }

        .menu {
            display: flex;
            gap: 40px;
        }

        .menu a { 
            text-decoration: none; 
            color: white; 
            opacity: 0.5; 
            font-size: 11px; 
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: 0.4s;
        }

        .menu a:hover { 
            opacity: 1; 
        }

        /* --- Hero Section --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url("https://images.unsplash.com/photo-1520975922284-9f3c1b7c0c2d?q=80&w=2000") center/cover no-repeat;
        }

        .hero h1 {
            font-size: clamp(36px, 10vw, 85px);
            letter-spacing: 18px;
            margin: 0;
            animation: clearFadeUp 1.4s cubic-bezier(0.2, 1, 0.3, 1) forwards;
        }

        .hero p {
            letter-spacing: 6px;
            opacity: 0;
            font-size: 12px;
            margin-top: 25px;
            animation: clearFadeUp 1.4s cubic-bezier(0.2, 1, 0.3, 1) 0.4s forwards;
            text-transform: uppercase;
            color: #888;
        }

        /* --- Collection Grid --- */
        .collection { 
            padding: 140px 60px; 
            max-width: 1400px;
            margin: 0 auto;
            text-align: center; 
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 50px; 
            margin-top: 80px;
        }
        
        .card-link { 
            text-decoration: none; 
            color: inherit; 
            opacity: 0; 
            transform: translateY(40px);
            transition: 1.2s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .card-link.active { 
            opacity: 1; 
            transform: translateY(0);
        }

        .card { overflow: hidden; }

        .card img { 
            width: 100%; 
            display: block;
            transition: 1.2s cubic-bezier(0.2, 1, 0.3, 1); 
            filter: grayscale(20%) brightness(0.8); 
        }
        
        .card:hover img { 
            transform: scale(1.05); 
            filter: grayscale(0%) brightness(1); 
        }

        .card p { 
            margin-top: 25px; 
            font-size: 11px; 
            letter-spacing: 3px; 
            color: #666;
            text-transform: uppercase;
        }

        /* Animations */
        @keyframes clearFadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Footer */
        footer {
            padding: 100px 60px;
            text-align: center;
            border-top: 1px solid #111;
        }

        /* Mobile Responsive */
        @media (max-width: 850px) {
            .grid { grid-template-columns: 1fr; gap: 60px; }
            nav { padding: 20px 30px; }
            nav.scrolled { padding: 15px 30px; }
            .menu { gap: 20px; }
            .menu a { font-size: 10px; letter-spacing: 1px; }
        }
    </style>
</head>
<body>

    <nav id="mainNav">
        <a href="index.html" class="logo">NOIR SHINJU</a>
        <div class="menu">
            <a href="index.html">HOME</a>
            <a href="#collection">COLLECTION</a>
            <a href="https://www.instagram.com/noirshinju" target="_blank">INSTAGRAM</a>
        </div>
    </nav>

    <section class="hero">
        <h1>NOIR SHINJU</h1>
        <p>Quiet luxury in dark tones</p>
    </section>

    <section class="collection" id="collection">
        <div class="grid">
            <a href="product1.html" class="card-link">
                <div class="card"><img src="shirt1.png"><p>GOLF TEE / 1 OF 10</p></div>
            </a>
            
            <a href="product2.html" class="card-link">
                <div class="card"><img src="shirt2.png"><p>ESSENTIAL / 1 OF 10</p></div>
            </a>

            <a href="about.html" class="card-link">
                <div class="card">
                    <img src="shirt3.png"> 
                    <p>BRAND STORY / 00</p>
                </div>
            </a>
        </div>
    </section>

    <footer>
        <p style="font-size: 9px; color: #333; letter-spacing: 3px; text-transform: uppercase;">
            © 2026 NOIR SHINJU. TOKYO, JAPAN.
        </p>
    </footer>

    <script>
        // Scroll navigation effect
        const nav = document.getElementById('mainNav');
        window.onscroll = function() {
            if (window.scrollY > 80) {
                nav.classList.add('scrolled');
            } else {
                nav.classList.remove('scrolled');
            }
        };

        // Reveal animation on scroll
        const cards = document.querySelectorAll('.card-link');
        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                if(entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, { threshold: 0.1 });

        cards.forEach(card => observer.observe(card));
    </script>
<div id="star-container" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; overflow: hidden;"></div>

<style>
    .shooting-star {
        position: absolute;
        left: 50%;
        top: 50%;
        height: 2px;
        background: linear-gradient(-45deg, rgba(255,255,255,1), rgba(0,0,255,0));
        filter: drop-shadow(0 0 6px rgba(255,255,255,0.8));
        animation: tail 3s ease-in-out infinite, shooting 3s ease-in-out infinite;
        opacity: 0;
    }

    @keyframes tail {
        0% { width: 0; }
        30% { width: 100px; }
        100% { width: 0; }
    }

    @keyframes shooting {
        0% { transform: translateX(0) translateY(0) rotate(45deg); opacity: 1; }
        100% { transform: translateX(-500px) translateY(500px) rotate(45deg); opacity: 0; }
    }
</style>

<div id="star-field" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1;"></div>

<style>
    .star-ray {
        position: absolute;
        background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.8) 50%, rgba(255,255,255,0) 100%);
        height: 1px; /* 极细，才有高级感 */
        filter: blur(0.5px); /* 微弱模糊 */
        transform: rotate(-35deg); /* 电影常见的入场角度 */
        opacity: 0;
        pointer-events: none;
    }
</style>

<div id="starlight-canopy" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%);"></div>

<style>
    .star {
        position: absolute;
        background: white;
        border-radius: 50%;
        opacity: 0;
        /* 模拟光纤发散效果 */
        box-shadow: 0 0 3px 1px rgba(255, 255, 255, 0.2);
    }

    /* 呼吸动画：模拟星星闪烁 */
    @keyframes twinkle {
        0%, 100% { opacity: 0.2; transform: scale(1); }
        50% { opacity: 0.8; transform: scale(1.2); }
    }

    /* 高级感流星：极细、极快 */
    .starlight-meteor {
        position: absolute;
        height: 1px;
        background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,1) 50%, rgba(255,255,255,0) 100%);
        opacity: 0;
        pointer-events: none;
        filter: blur(0.5px);
    }
</style>

<script>
    const container = document.getElementById('starlight-canopy');
    const starCount = 150; // 星星数量

    // 1. 生成静谧星空
    for (let i = 0; i < starCount; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        
        // 随机大小：0.5px 到 1.5px 之间，模拟劳斯莱斯光纤头
        const size = Math.random() * 1.5 + 0.5;
        star.style.width = `${size}px`;
        star.style.height = `${size}px`;
        
        // 随机位置
        star.style.left = `${Math.random() * 100}%`;
        star.style.top = `${Math.random() * 100}%`;
        
        // 随机闪烁速度
        const duration = Math.random() * 3 + 2;
        const delay = Math.random() * 5;
        star.style.animation = `twinkle ${duration}s infinite ease-in-out ${delay}s`;
        
        container.appendChild(star);
    }

    // 2. 奢华流星：偶尔闪过
    function launchMeteor() {
        const meteor = document.createElement('div');
        meteor.className = 'starlight-meteor';
        
        const length = Math.random() * 80 + 50;
        const startX = Math.random() * window.innerWidth;
        const startY = Math.random() * window.innerHeight * 0.7;
        const speed = Math.random() * 0.4 + 0.3; // 极快

        meteor.style.width = `${length}px`;
        meteor.style.left = `${startX}px`;
        meteor.style.top = `${startY}px`;
        meteor.style.transform = `rotate(-30deg)`;

        const anim = meteor.animate([
            { transform: `translateX(0) translateY(0) rotate(-30deg)`, opacity: 0 },
            { transform: `translateX(-200px) translateY(120px) rotate(-30deg)`, opacity: 0.7, offset: 0.2 },
            { transform: `translateX(-500px) translateY(300px) rotate(-30deg)`, opacity: 0 }
        ], {
            duration: speed * 1000,
            easing: 'ease-out'
        });

        container.appendChild(meteor);
        anim.onfinish = () => meteor.remove();
    }

    // 每 8-15 秒才出现一次流星，保持克制
    function meteorLoop() {
        launchMeteor();
        setTimeout(meteorLoop, Math.random() * 7000 + 8000);
    }

    meteorLoop();
</script>
</body>
</html>
