<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOIR SHINJU | Quiet Luxury</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0a0a0a;
            --accent-color: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
            --transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            color: var(--accent-color);
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 导航栏优化：增加毛玻璃效果和滚动变色 */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 60px;
            z-index: 100;
            transition: var(--transition);
        }

        nav.scrolled {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(10px);
            padding: 15px 60px;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 4px;
        }

        .menu a {
            margin-left: 35px;
            text-decoration: none;
            color: var(--accent-color);
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.6;
            transition: 0.3s;
        }

        .menu a:hover {
            opacity: 1;
        }

        /* Hero Section 优化：增加视差感 */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                        url("https://images.unsplash.com/photo-1520975922284-9f3c1b7c0c2d?auto=format&fit=crop&q=80") center/cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(40px, 8vw, 90px); /* 响应式字体大小 */
            letter-spacing: 15px;
            margin-bottom: 20px;
            animation: heroFade 1.8s ease-out;
        }

        .hero p {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: var(--text-muted);
            animation: heroFade 2.5s ease-out;
        }

        @keyframes heroFade {
            from { opacity: 0; transform: translateY(20px); filter: blur(5px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        /* Collection 布局优化 */
        .collection {
            padding: 120px 10%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .collection h2 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            letter-spacing: 8px;
            margin-bottom: 80px;
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 50px;
        }

        .card-link {
            text-decoration: none;
            color: inherit;
        }

        .card {
            position: relative;
            overflow: hidden;
            transition: var(--transition);
        }

        .img-container {
            width: 100%;
            aspect-ratio: 3/4; /* 统一产品图比例 */
            background: #1a1a1a;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
            filter: grayscale(30%);
        }

        .card:hover img {
            transform: scale(1.08);
            filter: grayscale(0%);
        }

        .card p {
            font-size: 13px;
            letter-spacing: 2px;
            text-align: center;
            opacity: 0.8;
        }

        /* 滚动展示动画 */
        .reveal {
            opacity: 0;
            transform: translateY(50px);
            transition: var(--transition);
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* Footer */
        footer {
            padding: 80px 20px;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.05);
            font-size: 12px;
            letter-spacing: 2px;
            color: var(--text-muted);
        }

        /* 移动端适配 */
        @media (max-width: 992px) {
            .grid { grid-template-columns: repeat(2, 1fr); gap: 30px; }
            nav { padding: 20px 30px; }
        }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
            nav .menu { display: none; } /* 手机端建议隐藏菜单或做成汉堡菜单 */
            .hero h1 { letter-spacing: 8px; }
        }
    </style>
</head>

<body>

    <nav id="navbar">
        <div class="logo">NOIR SHINJU</div>
        <div class="menu">
            <a href="#">Home</a>
            <a href="#collection">Collection</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </div>
    </nav>

    <section class="hero">
        <h1>NOIR SHINJU</h1>
        <p>Quiet luxury in dark tones</p>
    </section>

    <section class="collection" id="collection">
        <h2 class="reveal">LATEST COLLECTION</h2>
        
        <div class="grid">
            <a href="product1.html" class="card-link reveal">
                <div class="card">
                    <div class="img-container">
                        <img src="shirt1.png" alt="Golf Tee">
                    </div>
                    <p>NOIR SHINJU GOLF TEE</p>
                </div>
            </a>

            <a href="#" class="card-link reveal">
                <div class="card">
                    <div class="img-container">
                        <img src="shirt2.png" alt="Collection">
                    </div>
                    <p>NOIR SHINJU COLLECTION</p>
                </div>
            </a>

            <a href="#" class="card-link reveal">
                <div class="card">
                    <div class="img-container">
                        <img src="shirt3.png" alt="Limited Edition">
                    </div>
                    <p>NOIR SHINJU LIMITED</p>
                </div>
            </a>
        </div>
    </section>

    <footer>
        &copy; 2026 NOIR SHINJU. ALL RIGHTS RESERVED.
    </footer>

    <script>
        // 1. 滚动显示元素
        function reveal() {
            const reveals = document.querySelectorAll(".reveal");
            const windowHeight = window.innerHeight;
            
            reveals.forEach(el => {
                const elementTop = el.getBoundingClientRect().top;
                const elementVisible = 150;
                if (elementTop < windowHeight - elementVisible) {
                    el.classList.add("active");
                }
            });
        }

        // 2. 导航栏滚动变色
        function handleScroll() {
            const nav = document.getElementById("navbar");
            if (window.scrollY > 50) {
                nav.classList.add("scrolled");
            } else {
                nav.classList.remove("scrolled");
            }
        }

        window.addEventListener("scroll", () => {
            reveal();
            handleScroll();
        });

        // 页面加载时执行一次
        window.addEventListener("load", () => {
            reveal();
        });
    </script>

</body>
</html>
