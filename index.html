<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Noir Shinju</title>

<style>

body{
margin:0;
font-family:Helvetica,Arial,sans-serif;
background:black;
color:white;
overflow-x:hidden;
}

/* 顶部导航 */

nav{
position:absolute;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:30px 60px;
letter-spacing:3px;
z-index:10;
}

.logo{
font-size:20px;
font-weight:600;
}

.menu a{
margin-left:30px;
text-decoration:none;
color:white;
opacity:0.8;
}

.menu a:hover{
opacity:1;
}

/* 首页背景 */

.hero{
height:100vh;
background:url("https://images.unsplash.com/photo-1520975922284-9f3c1b7c0c2d") center/cover no-repeat;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

/* 黑色遮罩 */

.hero::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.55);
}

/* 标题 */

.hero h1{
font-size:90px;
letter-spacing:15px;
z-index:2;
animation:fade 2s ease;
}

.hero p{
z-index:2;
font-size:18px;
opacity:0.8;
letter-spacing:3px;
}

/* 动画 */

@keyframes fade{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* collection */

.collection{

padding:120px 60px;
text-align:center;

}

.collection h2{

font-size:32px;
letter-spacing:6px;
margin-bottom:70px;

}

.grid{

display:grid;
grid-template-columns:repeat(3,1fr);
gap:40px;

}

.card{

.card{
background:#111;
padding:0;
overflow:hidden;
transition:0.4s;
text-align:center;
}
.card img{
width:100%;
display:block;
}

.card p{
padding:15px;
letter-spacing:2px;
}


.card:hover{

background:#222;
transform:scale(1.05);

}

/* footer */

footer{

padding:50px;
text-align:center;
opacity:0.5;

}
.reveal{
opacity:0;
transform:translateY(40px);
transition:1s;
}

.reveal.active{
opacity:1;
transform:translateY(0);
}
</style>

</head>

<body>

<nav>

<div class="logo">
NOIR SHINJU
</div>

<div class="menu">

<a href="#">Home</a>
<a href="#">Collection</a>
<a href="#">About</a>
<a href="#">Contact</a>

</div>

</nav>


<section class="hero">

<h1>NOIR SHINJU</h1>

<p>Quiet luxury in dark tones</p>

</section>


<section class="collection reveal">


<h2>COLLECTION</h2>

<div class="grid">

<div class="card reveal">

<img src="shirt1.png">

<p>Noir Shinju Golf Tee</p>

</div>

</div>


<div class="card reveal">

<img src="https://images.unsplash.com/photo-1520974735194-49d5f64c6e4b" width="100%">

<p>MIDNIGHT SILK</p>

</div>

<div class="card reveal">

<img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d" width="100%">

<p>SHADOW LINE</p>

</div>

</div>


</section>


<footer>

© 2026 Noir Shinju

</footer>
<script>

function reveal(){

var reveals=document.querySelectorAll(".reveal");

for(var i=0;i<reveals.length;i++){

var windowHeight=window.innerHeight;
var elementTop=reveals[i].getBoundingClientRect().top;
var elementVisible=100;

if(elementTop<windowHeight-elementVisible){

reveals[i].classList.add("active");

}

}

}

window.addEventListener("scroll",reveal);

</script>
</body>

</html>
