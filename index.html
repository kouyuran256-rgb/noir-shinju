<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOIR SHINJU | HOME</title>
    <style>
        /* Base Styles */
        body {
            margin: 0;
            background: black;
            color: white;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            scroll-behavior: smooth;
        }

        /* --- Navigation --- */
        nav {
            position: fixed; 
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 60px;
            z-index: 999;
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            box-sizing: border-box;
        }

        nav.scrolled {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            padding: 15px 60px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo { 
            font-weight: 700; 
            font-size: 18px; 
            letter-spacing: 5px;
            text-decoration: none;
            color: white;
        }

        .menu {
            display: flex;
            gap: 40px;
        }

        .menu a { 
            text-decoration: none; 
            color: white; 
            opacity: 0.5; 
            font-size: 11px; 
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: 0.4s;
        }

        .menu a:hover { 
            opacity: 1; 
        }

        /* --- Hero Section --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url("https://images.unsplash.com/photo-1520975922284-9f3c1b7c0c2d?q=80&w=2000") center/cover no-repeat;
        }

        .hero h1 {
            font-size: clamp(36px, 10vw, 85px);
            letter-spacing: 18px;
            margin: 0;
            animation: clearFadeUp 1.4s cubic-bezier(0.2, 1, 0.3, 1) forwards;
        }

        .hero p {
            letter-spacing: 6px;
            opacity: 0;
            font-size: 12px;
            margin-top: 25px;
            animation: clearFadeUp 1.4s cubic-bezier(0.2, 1, 0.3, 1) 0.4s forwards;
            text-transform: uppercase;
            color: #888;
        }

        /* --- Collection Grid --- */
        .collection { 
            padding: 140px 60px; 
            max-width: 1400px;
            margin: 0 auto;
            text-align: center; 
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 50px; 
            margin-top: 80px;
        }
        
        .card-link { 
            text-decoration: none; 
            color: inherit; 
            opacity: 0; 
            transform: translateY(40px);
            transition: 1.2s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .card-link.active { 
            opacity: 1; 
            transform: translateY(0);
        }

        .card { overflow: hidden; }

        .card img { 
            width: 100%; 
            display: block;
            transition: 1.2s cubic-bezier(0.2, 1, 0.3, 1); 
            filter: grayscale(20%) brightness(0.8); 
        }
        
        .card:hover img { 
            transform: scale(1.05); 
            filter: grayscale(0%) brightness(1); 
        }

        .card p { 
            margin-top: 25px; 
            font-size: 11px; 
            letter-spacing: 3px; 
            color: #666;
            text-transform: uppercase;
        }

        /* Animations */
        @keyframes clearFadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Footer */
        footer {
            padding: 100px 60px;
            text-align: center;
            border-top: 1px solid #111;
        }

        /* Mobile Responsive */
        @media (max-width: 850px) {
            .grid { grid-template-columns: 1fr; gap: 60px; }
            nav { padding: 20px 30px; }
            nav.scrolled { padding: 15px 30px; }
            .menu { gap: 20px; }
            .menu a { font-size: 10px; letter-spacing: 1px; }
        }
    </style>
</head>
<body>

    <nav id="mainNav">
        <a href="index.html" class="logo">NOIR SHINJU</a>
        <div class="menu">
            <a href="index.html">HOME</a>
            <a href="#collection">COLLECTION</a>
            <a href="https://www.instagram.com/noirshinju" target="_blank">INSTAGRAM</a>
        </div>
    </nav>

    <section class="hero">
        <h1>NOIR SHINJU</h1>
        <p>Quiet luxury in dark tones</p>
    </section>

    <section class="collection" id="collection">
        <div class="grid">
            <a href="product1.html" class="card-link">
                <div class="card"><img src="shirt1.png"><p>GOLF TEE / 1 OF 10</p></div>
            </a>
            
            <a href="product2.html" class="card-link">
                <div class="card"><img src="shirt2.png"><p>ESSENTIAL / 1 OF 10</p></div>
            </a>

            <a href="about.html" class="card-link">
                <div class="card">
                    <img src="shirt3.png"> 
                    <p>BRAND STORY / 00</p>
                </div>
            </a>
        </div>
    </section>

    <footer>
        <p style="font-size: 9px; color: #333; letter-spacing: 3px; text-transform: uppercase;">
            © 2026 NOIR SHINJU. TOKYO, JAPAN.
        </p>
    </footer>

    <script>
        // Scroll navigation effect
        const nav = document.getElementById('mainNav');
        window.onscroll = function() {
            if (window.scrollY > 80) {
                nav.classList.add('scrolled');
            } else {
                nav.classList.remove('scrolled');
            }
        };

        // Reveal animation on scroll
        const cards = document.querySelectorAll('.card-link');
        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                if(entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, { threshold: 0.1 });

        cards.forEach(card => observer.observe(card));
    </script>
<div id="star-container" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; overflow: hidden;"></div>

<style>
    .shooting-star {
        position: absolute;
        left: 50%;
        top: 50%;
        height: 2px;
        background: linear-gradient(-45deg, rgba(255,255,255,1), rgba(0,0,255,0));
        filter: drop-shadow(0 0 6px rgba(255,255,255,0.8));
        animation: tail 3s ease-in-out infinite, shooting 3s ease-in-out infinite;
        opacity: 0;
    }

    @keyframes tail {
        0% { width: 0; }
        30% { width: 100px; }
        100% { width: 0; }
    }

    @keyframes shooting {
        0% { transform: translateX(0) translateY(0) rotate(45deg); opacity: 1; }
        100% { transform: translateX(-500px) translateY(500px) rotate(45deg); opacity: 0; }
    }
</style>

<div id="star-field" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1;"></div>

<style>
    .star-ray {
        position: absolute;
        background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.8) 50%, rgba(255,255,255,0) 100%);
        height: 1px; /* 极细，才有高级感 */
        filter: blur(0.5px); /* 微弱模糊 */
        transform: rotate(-35deg); /* 电影常见的入场角度 */
        opacity: 0;
        pointer-events: none;
    }
</style>

<script>
    function spawnStar() {
        const field = document.getElementById('star-field');
        const star = document.createElement('div');
        star.className = 'star-ray';
        
        // 随机参数，确保自然
        const w = Math.random() * 150 + 100; // 长度
        const x = Math.random() * window.innerWidth; // 初始X
        const y = Math.random() * (window.innerHeight / 2); // 初始Y（只在屏幕上半部出现）
        const duration = Math.random() * 0.5 + 0.4; // 极速：0.4s-0.9s完成

        star.style.width = w + 'px';
        star.style.left = x + 'px';
        star.style.top = y + 'px';

        // 使用 JS 驱动动画，确保轨迹更丝滑
        const animation = star.animate([
            { transform: `translate(0, 0) rotate(-35deg)`, opacity: 0 },
            { transform: `translate(-100px, 70px) rotate(-35deg)`, opacity: 0.6, offset: 0.2 },
            { transform: `translate(-500px, 350px) rotate(-35deg)`, opacity: 0 }
        ], {
            duration: duration * 1000,
            easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)' // 减速曲线，看起来更写实
        });

        field.appendChild(star);
        animation.onfinish = () => star.remove();
    }

    // 严控频率：每 5 到 12 秒才出现一颗，这种“难得一见”的感觉才贵
    function loop() {
        spawnStar();
        setTimeout(loop, Math.random() * 7000 + 5000);
    }

    loop();
</script>
</body>
</html>
