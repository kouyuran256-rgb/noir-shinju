<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOIR SHINJU | HOME</title>
    <style>
        body {
            margin: 0;
            background: black;
            color: white;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 顶部导航 */
        nav {
            position: absolute;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 30px 60px;
            letter-spacing: 3px;
            z-index: 10;
        }
        .logo { font-weight: 600; font-size: 18px; }
        .menu a { margin-left: 30px; text-decoration: none; color: white; opacity: 0.6; font-size: 12px; }

        /* 首屏视觉 */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url("https://images.unsplash.com/photo-1520975922284-9f3c1b7c0c2d?q=80&w=2000") center/cover no-repeat;
        }

        .hero h1 {
            font-size: clamp(40px, 8vw, 80px);
            letter-spacing: 15px;
            margin: 0;
            /* 这里的动画去掉了模糊，只保留透明度和位移 */
            animation: clearFadeUp 1.2s cubic-bezier(0.2, 1, 0.3, 1) forwards;
        }

        .hero p {
            letter-spacing: 5px;
            opacity: 0;
            font-size: 12px;
            margin-top: 20px;
            animation: clearFadeUp 1.2s cubic-bezier(0.2, 1, 0.3, 1) 0.3s forwards;
        }

        /* 产品列表区 */
        .collection { padding: 100px 60px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; margin-top: 50px; }
        
        .card-link { text-decoration: none; color: inherit; opacity: 0; }
        .card-link.active { animation: clearFadeUp 1s cubic-bezier(0.2, 1, 0.3, 1) forwards; }

        .card img { width: 100%; transition: 0.5s; filter: brightness(0.8); }
        .card:hover img { transform: scale(1.03); filter: brightness(1); }
        .card p { margin-top: 15px; font-size: 11px; letter-spacing: 2px; }

        /* 核心动画：清爽高清 */
        @keyframes clearFadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
            nav { padding: 20px; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">NOIR SHINJU</div>
        <div class="menu"><a href="#">Home</a><a href="#collection">Collection</a></div>
    </nav>

    <section class="hero">
        <h1>NOIR SHINJU</h1>
        <p>Quiet luxury in dark tones</p>
    </section>

    <section class="collection" id="collection">
        <div class="grid">
            <a href="product1.html" class="card-link active">
                <div class="card"><img src="shirt1.png"><p>NOIR SHINJU 01</p></div>
            </a>
            <a href="product2.html" class="card-link active" style="animation-delay: 0.2s;">
                <div class="card"><img src="shirt2.png"><p>NOIR SHINJU 02</p></div>
            </a>
            <a href="product3.html" class="card-link active" style="animation-delay: 0.4s;">
                <div class="card"><img src="shirt3.png"><p>NOIR SHINJU 03</p></div>
            </a>
        </div>
    </section>

    <script>
        // 简单的滚动触发动画逻辑
        const cards = document.querySelectorAll('.card-link');
        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                if(entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });
        cards.forEach(card => observer.observe(card));
    </script>
</body>
</html>
