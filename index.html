<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOIR SHINJU | HOME</title>
    <style>
        /* 基础样式 */
        body {
            margin: 0;
            background: black;
            color: white;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            scroll-behavior: smooth;
        }

        /* --- 导航栏优化 --- */
        nav {
            position: fixed; 
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 60px;
            z-index: 999;
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            box-sizing: border-box; /* 确保padding不会撑开宽度 */
        }

        /* 下滑时的毛玻璃变色效果 */
        nav.scrolled {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            padding: 15px 60px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo { 
            font-weight: 700; 
            font-size: 18px; 
            letter-spacing: 5px;
            text-decoration: none;
            color: white;
        }

        .menu {
            display: flex;
            gap: 40px;
        }

        .menu a { 
            text-decoration: none; 
            color: white; 
            opacity: 0.5; 
            font-size: 11px; 
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: 0.4s;
        }

        .menu a:hover { 
            opacity: 1; 
        }

        /* --- Hero 区域 --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            /* 黑色遮罩层确保文字可见 */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url("https://images.unsplash.com/photo-1520975922284-9f3c1b7c0c2d?q=80&w=2000") center/cover no-repeat;
        }

        .hero h1 {
            font-size: clamp(36px, 10vw, 85px);
            letter-spacing: 18px;
            margin: 0;
            animation: clearFadeUp 1.4s cubic-bezier(0.2, 1, 0.3, 1) forwards;
        }

        .hero p {
            letter-spacing: 6px;
            opacity: 0;
            font-size: 12px;
            margin-top: 25px;
            animation: clearFadeUp 1.4s cubic-bezier(0.2, 1, 0.3, 1) 0.4s forwards;
        }

        /* --- 产品列表区 --- */
        .collection { 
            padding: 140px 60px; 
            max-width: 1400px;
            margin: 0 auto;
            text-align: center; 
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 50px; 
            margin-top: 80px;
        }
        
        .card-link { 
            text-decoration: none; 
            color: inherit; 
            opacity: 0; 
            transform: translateY(40px);
            transition: 1.2s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .card-link.active { 
            opacity: 1; 
            transform: translateY(0);
        }

        .card { overflow: hidden; }

        .card img { 
            width: 100%; 
            display: block;
            transition: 1.2s cubic-bezier(0.2, 1, 0.3, 1); 
            filter: grayscale(20%) brightness(0.8); 
        }
        
        .card:hover img { 
            transform: scale(1.05); 
            filter: grayscale(0%) brightness(1); 
        }

        .card p { 
            margin-top: 25px; 
            font-size: 11px; 
            letter-spacing: 3px; 
            color: #666;
            text-transform: uppercase;
        }

        /* 动画关键帧 */
        @keyframes clearFadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 页脚 */
        footer {
            padding: 100px 60px;
            text-align: center;
            border-top: 1px solid #111;
        }

        /* 移动端适配 */
        @media (max-width: 850px) {
            .grid { grid-template-columns: 1fr; gap: 60px; }
            nav { padding: 20px 30px; }
            nav.scrolled { padding: 15px 30px; }
            .menu { gap: 20px; }
            .menu a { font-size: 10px; letter-spacing: 1px; }
        }
    </style>
</head>
<body>

    <nav id="mainNav">
        <a href="index.html" class="logo">NOIR SHINJU</a>
        <div class="menu">
            <a href="index.html">Home</a>
            <a href="#collection">Collection</a>
            <a href="https://www.instagram.com/noirshinju?igsh=emhvdDdpZmVydXFy&utm_source=qr" target="_blank">Instagram</a>
        </div>
    </nav>

    <section class="hero">
        <h1>NOIR SHINJU</h1>
        <p>Quiet luxury in dark tones</p>
    </section>

    <section class="collection" id="collection">
        <div class="grid">
            <a href="product1.html" class="card-link">
                <div class="card"><img src="shirt1.png"><p>GOLF TEE / 1 OF 10</p></div>
            </a>
            
            <a href="product2.html" class="card-link">
                <div class="card"><img src="shirt2.png"><p>ESSENTIAL / 1 OF 10</p></div>
            </a>

            <a href="about.html" class="card-link">
                <div class="card">
                    <img src="shirt3.png"> 
                    <p>BRAND STORY / 品牌介绍</p>
                </div>
            </a>
        </div>
    </section>

    <footer>
        <p style="font-size: 9px; color: #333; letter-spacing: 3px; text-transform: uppercase;">
            © 2026 NOIR SHINJU. TOKYO, JAPAN.
        </p>
    </footer>

    <script>
        // 1. 导航栏滚动变色
        const nav = document.getElementById('mainNav');
        window.onscroll = function() {
            if (window.scrollY > 80) {
                nav.classList.add('scrolled');
            } else {
                nav.classList.remove('scrolled');
            }
        };

        // 2. 产品卡片滚动显现动画
        const cards = document.querySelectorAll('.card-link');
        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                if(entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, { threshold: 0.1 });

        cards.forEach(card => observer.observe(card));
    </script>
</body>
</html>
