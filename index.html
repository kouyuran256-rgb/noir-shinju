<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOIR SHINJU | HOME</title>
    <style>
        /* Base Styles */
        body {
            margin: 0;
            background: black;
            color: white;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            scroll-behavior: smooth;
        }

        /* --- Navigation --- */
        nav {
            position: fixed; 
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 60px;
            z-index: 999;
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            box-sizing: border-box;
        }

        nav.scrolled {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            padding: 15px 60px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo { 
            font-weight: 700; 
            font-size: 16px; 
            letter-spacing: 4px;
            text-decoration: none;
            color: white;
            display: inline-block;
        }

        .menu {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .menu a { 
            text-decoration: none; 
            color: white; 
            opacity: 0.5; 
            font-size: 10px; 
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: opacity 0.4s;
            display: inline-block;
        }

        /* --- Tokyo Clock --- */
        #tokyo-clock {
            font-size: 10px;
            letter-spacing: 2px;
            color: #555;
            text-transform: uppercase;
            margin-right: 15px;
        }

        /* --- Hero Section --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url("https://images.unsplash.com/photo-1520975922284-9f3c1b7c0c2d?q=80&w=2000") center/cover no-repeat;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: clamp(32px, 8vw, 80px);
            letter-spacing: 12px;
            margin: 0;
            animation: clearFadeUp 1.4s cubic-bezier(0.2, 1, 0.3, 1) forwards;
        }

        .hero p {
            letter-spacing: 4px;
            opacity: 0;
            font-size: 10px;
            margin-top: 20px;
            animation: clearFadeUp 1.4s cubic-bezier(0.2, 1, 0.3, 1) 0.4s forwards;
            text-transform: uppercase;
            color: #888;
        }

        /* --- Collection Grid --- */
        .collection { 
            padding: 100px 60px; 
            max-width: 1400px;
            margin: 0 auto;
            text-align: center; 
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 40px; 
            margin-top: 60px;
        }
        
        .card-link { 
            text-decoration: none; 
            color: inherit; 
            opacity: 0; 
            transform: translateY(30px);
            transition: opacity 1s, transform 1s;
            display: block;
        }

        .card-link.active { 
            opacity: 1; 
            transform: translateY(0);
        }

        .card { overflow: hidden; }

        .card img { 
            width: 100%; 
            aspect-ratio: 3/4;
            object-fit: cover;
            display: block;
            transition: 1.2s cubic-bezier(0.2, 1, 0.3, 1); 
            filter: grayscale(20%) brightness(0.8); 
        }
        
        .card p { 
            margin-top: 20px; 
            font-size: 10px; 
            letter-spacing: 2px; 
            color: #666;
            text-transform: uppercase;
        }

        /* 星空 Styles */
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0; }
        @keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.8; } }
        .starlight-meteor { position: absolute; height: 1px; background: linear-gradient(90deg, transparent, #fff, transparent); opacity: 0; }

        @keyframes clearFadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        footer { padding: 80px 40px; text-align: center; border-top: 1px solid #111; }

        /* --- 核心适配：Mobile Responsive --- */
        @media (max-width: 900px) {
            nav { padding: 20px 30px; }
            #tokyo-clock { display: none; } /* 手机端隐藏时钟防止拥挤 */
            .menu { gap: 15px; }
            .collection { padding: 60px 20px; }
            .grid { 
                grid-template-columns: 1fr; /* 手机端变为 1 列 */
                gap: 50px; 
            }
            .hero h1 { letter-spacing: 8px; }
        }
    </style>
</head>
<body>

    <div id="starlight-canopy" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%);"></div>

    <nav id="mainNav">
        <a href="index.html" class="logo">NOIR SHINJU</a>
        <div class="menu">
            <div id="tokyo-clock">TOKYO <span id="clock-time">00:00:00</span></div>
            <a href="index.html">HOME</a>
            <a href="#collection">COLLECTION</a>
            <a href="https://www.instagram.com/noirshinju" target="_blank">INSTAGRAM</a>
        </div>
    </nav>

    <section class="hero">
        <h1>NOIR SHINJU</h1>
        <p>Quiet luxury in dark tones</p>
    </section>

    <section class="collection" id="collection">
        <div class="grid">
            <a href="product1.html" class="card-link">
                <div class="card"><img src="shirt1.png"><p>GOLF TEE / 1 OF 10</p></div>
            </a>
            <a href="product2.html" class="card-link">
                <div class="card"><img src="shirt2.png"><p>ESSENTIAL / 1 OF 10</p></div>
            </a>
            <a href="about.html" class="card-link">
                <div class="card"><img src="shirt3.png"><p>BRAND STORY / 00</p></div>
            </a>
        </div>
    </section>

    <footer>
        <p style="font-size: 8px; color: #333; letter-spacing: 2px; text-transform: uppercase;">
            © 2026 NOIR SHINJU. TOKYO, JAPAN.
        </p>
    </footer>

    <script>
        // 1. 导航栏效果
        const nav = document.getElementById('mainNav');
        window.onscroll = () => {
            window.scrollY > 50 ? nav.classList.add('scrolled') : nav.classList.remove('scrolled');
        };

        // 2. 滚动显示
        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => { if(entry.isIntersecting) entry.target.classList.add('active'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.card-link').forEach(card => observer.observe(card));

        // 3. 星空顶
        const container = document.getElementById('starlight-canopy');
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 1.5;
            star.style.cssText = `width:${size}px; height:${size}px; left:${Math.random()*100}%; top:${Math.random()*100}%; animation: twinkle ${Math.random()*3+2}s infinite ${Math.random()*5}s`;
            container.appendChild(star);
        }

        // 4. 东京时钟
        function updateClock() {
            const time = new Date().toLocaleTimeString('en-GB', {timeZone:'Asia/Tokyo', hour12:false});
            document.getElementById('clock-time').innerHTML = time;
        }
        setInterval(updateClock, 1000); updateClock();

        // 5. 磁性吸附 (仅在非触摸屏电脑端生效)
        if (window.matchMedia("(pointer: fine)").matches) {
            const elements = document.querySelectorAll('.menu a, .card-link, .logo');
            elements.forEach(el => {
                el.addEventListener('mousemove', (e) => {
                    const rect = el.getBoundingClientRect();
                    const x = (e.clientX - rect.left - rect.width/2) * 0.3;
                    const y = (e.clientY - rect.top - rect.height/2) * 0.3;
                    el.style.transform = `translate(${x}px, ${y}px)`;
                    el.style.transition = 'transform 0.1s ease-out';
                });
                el.addEventListener('mouseleave', () => {
                    el.style.transform = 'translate(0, 0)';
                    el.style.transition = 'transform 0.5s ease-out';
                });
            });
        }
    </script>
</body>
</html>
