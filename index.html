<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noir Shinju</title>

<style>

body{
margin:0;
font-family:Helvetica, Arial, sans-serif;
background:black;
color:white;
}

/* 顶部导航 */

nav{
display:flex;
justify-content:space-between;
padding:30px 60px;
letter-spacing:2px;
}

.logo{
font-size:22px;
font-weight:600;
}

.menu a{
margin-left:30px;
text-decoration:none;
color:white;
opacity:0.8;
}

.menu a:hover{
opacity:1;
}

/* 首页大图 */

.hero{
height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:80px;
letter-spacing:10px;
margin:0;
}

.hero p{
margin-top:20px;
font-size:18px;
opacity:0.7;
}

/* 产品区 */

.collection{
padding:100px 60px;
text-align:center;
}

.collection h2{
font-size:30px;
margin-bottom:50px;
letter-spacing:5px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:40px;
}

.card{
background:#111;
height:250px;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
letter-spacing:2px;
}

/* 页脚 */

footer{
text-align:center;
padding:40px;
opacity:0.5;
font-size:14px;
}

</style>

</head>

<body>

<nav>

<div class="logo">
NOIR SHINJU
</div>

<div class="menu">
<a href="#">Home</a>
<a href="#">Collection</a>
<a href="#">About</a>
<a href="#">Contact</a>
</div>

</nav>

<section class="hero">

<h1>NOIR SHINJU</h1>

<p>Quiet luxury in dark tones</p>

</section>

<section class="collection">

<h2>COLLECTION</h2>

<div class="grid">

<div class="card">BLACK PEARL</div>

<div class="card">SHADOW SILK</div>

<div class="card">MIDNIGHT LINE</div>

</div>

</section>

<footer>

© 2026 Noir Shinju

</footer>

</body>

</html>
