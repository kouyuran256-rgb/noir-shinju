<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOIR SHINJU | GOLF TEE</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
        
        /* Navigation */
        nav { position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; padding: 25px 60px; z-index: 1000; box-sizing: border-box; }
        .logo { font-weight: 700; font-size: 16px; letter-spacing: 4px; text-decoration: none; color: white; }
        .back { text-decoration: none; color: #666; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; transition: 0.3s; }
        .back:hover { color: white; }

        /* Hero: 模特大片 */
        .hero { position: relative; height: 100vh; width: 100%; overflow: hidden; background: #000; }
        .hero img { 
            width: 100%; height: 100%; object-fit: cover; 
            filter: brightness(0.7); 
            display: block;
        }
        .overlay { 
            position: absolute; bottom: 0; width: 100%; height: 50%; 
            background: linear-gradient(transparent, #000); 
        }

        /* Content: 产品详情 */
        .content { 
            max-width: 1200px; margin: 0 auto; padding: 100px 60px; 
            display: grid; grid-template-columns: 1.2fr 1fr; gap: 80px; 
        }
        .product-img img { width: 100%; filter: brightness(0.9); }
        
        .details { position: sticky; top: 120px; height: fit-content; }
        .details h1 { font-size: 32px; letter-spacing: 8px; font-weight: 300; margin: 0; }
        .price { color: #666; margin: 20px 0; letter-spacing: 2px; font-size: 18px; }
        .desc { font-size: 13px; line-height: 2.2; color: #999; margin: 40px 0; letter-spacing: 1px; }
        
        .buy-btn { 
            display: block; width: 100%; padding: 22px; background: white; color: black; 
            text-align: center; text-decoration: none; font-size: 11px; font-weight: 700; 
            letter-spacing: 4px; text-transform: uppercase; transition: 0.3s;
        }
        .buy-btn:hover { background: #333; color: white; }

        @media (max-width: 900px) {
            .content { grid-template-columns: 1fr; padding: 40px 25px; }
            nav { padding: 20px 30px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">NOIR SHINJU</a>
        <a href="index.html#collection" class="back">Close</a>
    </nav>

    <section class="hero">
        <img src="Your-model-image.png" alt="Noir Shinju Editorial">
        <div class="overlay"></div>
    </section>

    <section class="content">
        <div class="product-img">
            <img src="shirt1.png" alt="Golf Tee Product View">
        </div>

        <div class="details">
            <h1>GOLF TEE</h1>
            <div class="price">299 €</div>
            <p class="desc">
                1 OF 10 LIMITED PIECES. <br><br>
                High-density heavyweight Japanese cotton. 
                Signature "NOIR SHINJU" golf-skull graphic. 
                Designed in Tokyo, crafted for the eternal dark.
            </p>
            <a href="#" class="buy-btn">Request Purchase</a>
        </div>
    </section>

</body>
</html>
