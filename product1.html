<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOIR SHINJU | GOLF TEE</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Helvetica Neue', Arial, sans-serif; }
        
        /* 导航栏 */
        nav { position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; padding: 25px 60px; z-index: 1000; box-sizing: border-box; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        .logo { font-weight: 700; font-size: 16px; letter-spacing: 4px; text-decoration: none; color: white; }
        .back { text-decoration: none; color: #888; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; }

        /* 内容区 */
        .container { 
            max-width: 1200px; margin: 0 auto; padding: 120px 60px; 
            display: grid; grid-template-columns: 1fr 1fr; gap: 60px; 
        }
        .image-box img { width: 100%; height: auto; display: block; filter: brightness(0.9); }
        
        .info-box { padding-top: 40px; }
        .info-box h1 { font-size: 32px; letter-spacing: 6px; margin: 0; font-weight: 300; }
        .price { color: #666; margin: 20px 0 font-size: 18px; }
        .desc { font-size: 14px; line-height: 2; color: #999; margin: 40px 0; }
        
        .buy-btn { 
            display: block; width: 100%; padding: 20px; background: white; color: black; 
            text-align: center; text-decoration: none; font-size: 11px; font-weight: 700; 
            letter-spacing: 4px; text-transform: uppercase; 
        }

        /* 手机端适配 */
        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; padding: 100px 20px; }
            nav { padding: 20px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">NOIR SHINJU</a>
        <a href="index.html#collection" class="back">Back</a>
    </nav>

    <div class="container">
        <div class="image-box">
            <img src="shirt1.png" alt="Product Image">
        </div>

        <div class="info-box">
            <h1>GOLF TEE</h1>
            <div class="price">299 €</div>
            <p class="desc">
                1 OF 10 LIMITED PIECES. <br><br>
                High-density heavyweight Japanese cotton. <br>
                Designed in Tokyo.
            </p>
            <a href="#" class="buy-btn">Purchase</a>
        </div>
    </div>

</body>
</html>
