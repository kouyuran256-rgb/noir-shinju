<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOIR SHINJU | GOLF TEE 1/10</title>
    <style>
        body {
            margin: 0;
            background: black;
            color: white;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- 导航栏 (继承首页风格) --- */
        nav {
            position: fixed; top: 0; width: 100%; display: flex;
            justify-content: space-between; align-items: center;
            padding: 25px 60px; z-index: 1000; box-sizing: border-box;
            transition: 0.5s;
        }
        nav.scrolled { background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); padding: 15px 60px; }
        .logo { font-weight: 700; font-size: 16px; letter-spacing: 4px; text-decoration: none; color: white; }
        .back-btn { text-decoration: none; color: #888; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; transition: 0.3s; }
        .back-btn:hover { color: white; }

        /* --- Section 1: 电影感大片开场 --- */
        .hero-poster {
            position: relative;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(30%) brightness(0.7);
            transform: scale(1.05); /* 初始微缩放 */
            transition: 2s cubic-bezier(0.2, 1, 0.3, 1);
        }

        /* 渐变遮罩：让图片底部完美融入黑色 */
        .poster-overlay {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 60%;
            background: linear-gradient(to bottom, transparent, black);
            z-index: 2;
        }

        .poster-text {
            position: absolute;
            z-index: 3;
            text-align: center;
            bottom: 10%;
        }

        .poster-text h2 {
            font-size: 12px;
            letter-spacing: 10px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.5);
            margin-bottom: 20px;
        }

        /* --- Section 2: 产品详情区 --- */
        .product-detail {
            position: relative;
            padding: 100px 60px;
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 80px;
            z-index: 5;
        }

        .product-images img {
            width: 100%;
            margin-bottom: 40px;
            filter: brightness(0.9);
            transition: 1s;
        }
        .product-images img:hover { filter: brightness(1); }

        .product-info {
            position: sticky;
            top: 120px;
            height: fit-content;
        }

        .product-info h1 { font-size: 28px; letter-spacing: 6px; margin: 0; }
        .product-info .price { font-size: 18px; color: #888; margin-top: 15px; letter-spacing: 2px; }
        .product-info .desc { font-size: 13px; line-height: 1.8; color: #bbb; margin: 40px 0; letter-spacing: 1px; }

        .buy-btn {
            display: inline-block;
            width: 100%;
            padding: 20px;
            background: white;
            color: black;
            text-align: center;
            text-decoration: none;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: 0.4s;
        }
        .buy-btn:hover { background: #888; color: white; }

        /* 胶片噪点蒙版 */
        .grain-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Grain.png');
            opacity: 0.04; pointer-events: none; z-index: 999;
        }

        /* 响应式调整 */
        @media (max-width: 900px) {
            .product-detail { grid-template-columns: 1fr; padding: 60px 20px; }
            nav { padding: 20px 30px; }
            .product-info { position: relative; top: 0; }
        }
    </style>
</head>
<body>

    <div class="grain-overlay"></div>
    <div id="starlight-canopy" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; background: #000;"></div>

    <nav id="mainNav">
        <a href="index.html" class="logo">NOIR SHINJU</a>
        <a href="index.html#collection" class="back-btn">← Back</a>
    </nav>

    <section class="hero-poster">
        <img src="your-model-image.jpg" id="heroImg"> <div class="poster-overlay"></div>
        <div class="poster-text">
            <h2>Golf Collection</h2>
            <div style="width: 1px; height: 60px; background: rgba(255,255,255,0.2); margin: 0 auto;"></div>
        </div>
    </section>

    <section class="product-detail">
        <div class="product-images">
            <img src="shirt1.png" alt="Detail 1"> <img src="shirt1_back.png" alt="Detail 2"> </div>

        <div class="product-info">
            <h1>GOLF TEE</h1>
            <div class="price">299 €</div>
            <p class="desc">
                1 OF 10 LIMITED EDITION.<br><br>
                High-density heavy cotton with "NOIR SHINJU" signature golf skull print. 
                Designed in Tokyo. Crafted for the darkness.
            </p>
            
            <div style="margin-bottom: 40px;">
                <p style="font-size: 10px; color: #555; letter-spacing: 2px;">SIZE: ONE SIZE (OS)</p>
                <p style="font-size: 10px; color: #555; letter-spacing: 2px;">COLOR: MATTE BLACK</p>
            </div>

            <a href="#" class="buy-btn">Add to Cart</a>
        </div>
    </section>

    <script>
        // 导航栏滚动变色
        window.onscroll = () => {
            const nav = document.getElementById('mainNav');
            const heroImg = document.getElementById('heroImg');
            const scrollVal = window.scrollY;

            if (scrollVal > 50) nav.classList.add('scrolled');
            else nav.classList.remove('scrolled');

            // 随着滚动，海报轻微放大并变暗，增加深度感
            heroImg.style.transform = `scale(${1.05 + scrollVal/5000})`;
            heroImg.style.opacity = `${1 - scrollVal/800}`;
        };

        // 星空逻辑 (同首页，保持品牌一致性)
        const container = document.getElementById('starlight-canopy');
        for (let i = 0; i < 80; i++) {
            const star = document.createElement('div');
            star.style.cssText = `position:absolute; background:white; border-radius:50%; width:${Math.random()*1.5}px; height:${Math.random()*1.5}px; left:${Math.random()*100}%; top:${Math.random()*100}%; opacity:${Math.random()*0.5};`;
            container.appendChild(star);
        }
    </script>
</body>
</html>
