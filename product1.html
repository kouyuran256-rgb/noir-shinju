<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOIR SHINJU | LIMITED 1/10</title>

    <style>
        body {
            margin: 0;
            background-color: black;
            color: white;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* 顶部导航 */
        .back-nav {
            padding: 40px 60px;
        }
        .back-nav a {
            color: white;
            text-decoration: none;
            font-size: 12px;
            letter-spacing: 3px;
            opacity: 0.5;
            transition: 0.3s;
        }
        .back-nav a:hover { opacity: 1; }

        /* 主容器 */
        .container {
            display: flex;
            padding: 0 60px 100px 60px;
            gap: 80px;
            max-width: 1200px;
            margin: 0 auto;
            align-items: center;
        }

        .image-box {
            flex: 1;
            text-align: right;
        }
        .image-box img {
            width: 100%;
            max-width: 500px;
            animation: fadeIn 1.5s ease;
        }

        .info-box {
            flex: 1;
            max-width: 400px;
        }

        .collection-name {
            font-size: 11px;
            letter-spacing: 4px;
            color: #666;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        h1 {
            font-size: 32px;
            letter-spacing: 5px;
            margin: 0 0 30px 0;
            font-weight: 500;
        }

        /* 限量展示区：修改为 1 of 10 */
        .serial-section {
            display: flex;
            flex-direction: column; /* 改为垂直排列更显高级 */
            gap: 15px;
            border-top: 1px solid #222;
            border-bottom: 1px solid #222;
            padding: 25px 0;
            margin-bottom: 30px;
        }

        .serial-label {
            font-size: 10px;
            color: #444;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .serial-number {
            font-family: monospace;
            font-size: 18px;
            color: #fff;
            letter-spacing: 2px;
            font-weight: bold;
        }

        .description {
            font-size: 14px;
            line-height: 1.8;
            color: #888;
            margin-bottom: 40px;
        }

        .price {
            font-size: 24px;
            letter-spacing: 2px;
            font-weight: 300;
        }

        .footer-tag {
            margin-top: 50px;
            font-size: 10px;
            letter-spacing: 4px;
            color: #222; /* 颜色调深，若有若无的感觉 */
            text-transform: uppercase;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 850px) {
            .container {
                flex-direction: column;
                padding: 0 30px 80px 30px;
                text-align: center;
            }
            .image-box { text-align: center; }
        }
    </style>
</head>

<body>

    <nav class="back-nav">
        <a href="index.html">← NOIR SHINJU</a>
    </nav>

    <div class="container">
        <div class="image-box">
            <img src="shirt1.png" alt="Noir Shinju Golf Tee">
        </div>

        <div class="info-box">
            <div class="collection-name">Genesis Release</div>
            <h1>GOLF TEE</h1>

            <div class="serial-section">
                <div class="serial-label">Availability</div>
                <div class="serial-number">LIMITED EDITION 1 OF 10</div>
            </div>

            <div class="description">
                Minimal golf inspired streetwear piece.<br>
                Handcrafted as part of our exclusive first drop. 
                Only 10 units exist globally.
            </div>

            <div class="price">299 €</div>

            <div class="footer-tag">Noir Shinju Authenticity Guaranteed</div>
        </div>
    </div>

</body>

</html>
